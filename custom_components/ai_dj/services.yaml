start:
  name: Start DJ session
  description: >-
    Start an AI DJ session. The DJ interprets the prompt, queues the first
    tracks on the chosen Music Assistant player and keeps picking live.
  fields:
    prompt:
      name: Prompt
      description: What you're in the mood for, in your own words.
      required: true
      example: "Lazy Sunday morning jazz, nothing too loud"
      selector:
        text:
          multiline: true
    player:
      name: Speaker
      description: The Music Assistant media_player to play on.
      required: true
      selector:
        entity:
          domain: media_player
          integration: music_assistant

stop:
  name: End DJ session
  description: End the session. Already-queued tracks keep playing.

like:
  name: Like current track
  description: Tell the DJ you like the current track - it will lean into it.

wish:
  name: Wish
  description: >-
    Ask for a specific song (plays next, rest of the queue untouched) or a
    change of mood (replaces everything queued after the current track).
  fields:
    text:
      name: Wish
      description: A song wish or mood change.
      required: true
      example: "Play something by Prince"
      selector:
        text:

skip:
  name: Skip track
  description: Skip to the next queued track.

set_announce:
  name: Set voice announcements
  description: Turn the DJ's spoken comments on or off for the current session.
  fields:
    enabled:
      name: Enabled
      description: Whether dj_comment should be read aloud.
      required: true
      selector:
        boolean:

set_announce_pitch:
  name: Set announcer pitch
  description: >-
    Trim the DJ voice's pitch (semitones) up or down for the current
    session, on top of the current persona's base pitch.
  fields:
    pitch:
      name: Pitch trim
      description: Semitones to shift the announcer voice by, -12 to 12.
      required: true
      example: 3
      selector:
        number:
          min: -12
          max: 12
          step: 1
          mode: slider
